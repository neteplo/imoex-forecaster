services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: imoex
      POSTGRES_PASSWORD: imoex
      POSTGRES_DB: imoex
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imoex -d imoex"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: imoex
      RABBITMQ_DEFAULT_PASS: imoex
    ports:
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    image: imoex-forecaster:latest
    pull_policy: never
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8765
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://imoex:imoex@postgres:5432/imoex
      RABBITMQ_URL: amqp://imoex:imoex@rabbitmq:5672/
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./models:/app/models
      - ./scripts:/app/scripts
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8765/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 90s
    restart: unless-stopped

  predict-worker:
    image: imoex-forecaster:latest
    pull_policy: never
    command: python -m src.inference.predict_worker
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://imoex:imoex@postgres:5432/imoex
      RABBITMQ_URL: amqp://imoex:imoex@rabbitmq:5672/
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  bot:
    image: imoex-forecaster:latest
    pull_policy: never
    command: python -m src.bot.main --api-url http://api:8765
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://imoex:imoex@postgres:5432/imoex
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ingest:
    image: imoex-forecaster:latest
    pull_policy: never
    command: python -m src.ingest.scheduler
    environment:
      DATABASE_URL: postgresql+psycopg://imoex:imoex@postgres:5432/imoex
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
